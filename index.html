<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>3D Gallery - Trái Tim & Hình Ảnh</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #000;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      .btn {
        display: block;
        width: 100%;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        margin-bottom: 10px;
        transition: transform 0.3s;
      }

      .btn:hover {
        transform: scale(1.05);
      }

      .btn.danger {
        background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      }

      .btn.success {
        background: linear-gradient(135deg, #26de81, #20bf6b);
      }

      input[type="file"] {
        display: none;
      }

      .file-label {
        display: block;
        text-align: center;
        padding: 12px 20px;
        background: linear-gradient(135deg, #ffd93d, #f39c12);
        color: #000;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .file-label:hover {
        transform: scale(1.05);
      }

      .instructions {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        padding: 15px 30px;
        border-radius: 30px;
        color: white;
        font-size: 14px;
        backdrop-filter: blur(10px);
      }

      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        z-index: 1000;
      }

      .image-count {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 10px;
      }

      #error-msg {
        color: #ff6b6b;
        font-size: 12px;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="loading" id="loading">Đang tải...</div>

    <button id="menuToggle">☰</button>

    <div class="controls" id="controlPanel">
      <button class="btn" id="openLetter">💌 Thư Gửi Em</button>
      <button id="closePanel">✖</button>

      <h2>Bảng Điều Khiển</h2>

      <button class="btn success" onclick="toggleAutoRotate()">
        ⚡ Tự Xoay: Tắt
      </button>
      <button class="btn" onclick="resetCamera()">🔄 Reset Camera</button>

      <p id="error-msg"></p>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
      let scene, camera, renderer, controls;
      let heartMesh;
      let imageMeshes = [];
      let textMeshes = [];
      // tạo NEBULA MỜ
      function createNebula() {
        const size = 1024;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext("2d");

        const gradient = ctx.createRadialGradient(
          size / 2,
          size / 2,
          0,
          size / 2,
          size / 2,
          size / 2,
        );

        gradient.addColorStop(0, "rgba(255,100,200,0.4)");
        gradient.addColorStop(0.3, "rgba(150,50,255,0.25)");
        gradient.addColorStop(0.6, "rgba(50,0,150,0.15)");
        gradient.addColorStop(1, "rgba(0,0,0,0)");

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        const texture = new THREE.CanvasTexture(canvas);

        const geometry = new THREE.PlaneGeometry(800, 800);
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          depthWrite: false,
        });

        const nebula = new THREE.Mesh(geometry, material);

        nebula.position.z = -500; // rất xa phía sau
        scene.add(nebula);
      }
      // tạo sao
      function createStarTexture() {
        const size = 128;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext("2d");

        const gradient = ctx.createRadialGradient(
          size / 2,
          size / 2,
          0,
          size / 2,
          size / 2,
          size / 2,
        );

        gradient.addColorStop(0, "white");
        gradient.addColorStop(0.2, "rgba(255,255,255,0.8)");
        gradient.addColorStop(0.4, "rgba(255,255,255,0.4)");
        gradient.addColorStop(1, "rgba(255,255,255,0)");

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        return new THREE.CanvasTexture(canvas);
      }
      // tạo sao ở xa
      let starsNear, starsMid, starsFar;

      function createFarStars() {
        const positions = [];
        const starCount = 4000;
        const radius = 300;

        for (let i = 0; i < starCount; i++) {
          // random điểm trên hình cầu
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(Math.random() * 2 - 1);

          const r = radius;

          const x = r * Math.sin(phi) * Math.cos(theta);
          const y = r * Math.sin(phi) * Math.sin(theta);
          const z = r * Math.cos(phi);

          positions.push(x, y, z);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3),
        );

        const material = new THREE.PointsMaterial({
          size: 2,
          map: createStarTexture(),
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        stars = new THREE.Points(geometry, material);
        scene.add(stars);
      }
      function createStarLayer(radius, count, size, opacity) {
        const positions = [];

        for (let i = 0; i < count; i++) {
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(Math.random() * 2 - 1);

          const x = radius * Math.sin(phi) * Math.cos(theta);
          const y = radius * Math.sin(phi) * Math.sin(theta);
          const z = radius * Math.cos(phi);

          positions.push(x, y, z);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3),
        );

        const material = new THREE.PointsMaterial({
          size: size,
          map: createStarTexture(),
          transparent: true,
          opacity: opacity,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        return new THREE.Points(geometry, material);
      }

      function createLoveText() {
        const colors = [
          "#ff6b9d",
          "#ff3366",
          "#ff6699",
          "#ff99cc",
          "#ffffff",
          "#ff0066",
        ];

        for (let i = 0; i < 100; i++) {
          // Chọn ngẫu nhiên một trong 3 từ
          const phrases = ["I Love You", "Anh Yêu Em", "Anh Nhớ Em!"];
          const text = phrases[i % 3];
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = 500;
          canvas.height = 200;

          // Màu chữ
          const color = colors[i % colors.length];
          ctx.fillStyle = color;
          ctx.font = "bold 60px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "#ff0000";
          ctx.shadowBlur = 15;
          ctx.fillText(text, canvas.width / 2, canvas.height / 2);

          const texture = new THREE.CanvasTexture(canvas);
          const material = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            side: THREE.DoubleSide,
          });

          const geometry = new THREE.PlaneGeometry(1.5, 0.75);
          const mesh = new THREE.Mesh(geometry, material);

          // === QUỸ ĐẠO KHÁC NHAU ===
          mesh.userData = {
            // Góc ban đầu
            angle: Math.random() * Math.PI * 2,
            // Tốc độ quay khác nhau
            speed: 0.0005 + Math.random() * 0.001,
            // Bán kính quỹ đạo
            radiusX: 4 + Math.random() * 4, // Bán kính theo trục X
            radiusY: 2 + Math.random() * 3, // Bán kính theo trục Y (chiều cao)
            radiusZ: 4 + Math.random() * 4, // Bán kính theo trục Z
            // Độ nghiêng quỹ đạo
            tiltX: (Math.random() - 0.5) * 1,
            tiltZ: (Math.random() - 0.5) * 1,
            // Tự xoay
            rotSpeed: (Math.random() - 0.5) * 0.05,
            // Thời gian bắt đầu ngẫu nhiên
            timeOffset: Math.random() * 100,
          };

          textMeshes.push(mesh);
          scene.add(mesh);
        }
      }
      let isAutoRotate = false;
      let autoRotateBtn;

      function init() {
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 0, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 1);
        document
          .getElementById("canvas-container")
          .appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.minDistance = 3;
        controls.maxDistance = 20;

        // Ánh sáng
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff6b9d, 1.5, 100);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const pointLight2 = new THREE.PointLight(0x667eea, 1.5, 100);
        pointLight2.position.set(-5, -5, 5);
        scene.add(pointLight2);

        const pointLight3 = new THREE.PointLight(0xffffff, 0.5, 50);
        pointLight3.position.set(0, 0, 10);
        scene.add(pointLight3);
        // /chỗ này/
        createHeartParticles();
        createParticles();
        createLoveText();
        // tạo chiều sâu của lớp sao
        starsNear = createStarLayer(150, 1500, 2.5, 0.9);
        starsMid = createStarLayer(250, 2500, 1.8, 0.7);
        starsFar = createStarLayer(400, 4000, 1.2, 0.5);

        scene.add(starsNear);
        scene.add(starsMid);
        scene.add(starsFar);

        document.getElementById("loading").style.display = "none";

        autoRotateBtn = document.querySelector(".btn.success");

        window.addEventListener("resize", onWindowResize);

        animate();
      }

      function createImageMesh(img, indexInBatch, existingCount) {
        // Kích thước ảnh nhỏ hơn để không bị chạm
        const aspectRatio = img.width / img.height;
        const maxSize = 1.2; // Giảm kích thước xuống
        let width, height;

        if (aspectRatio > 1) {
          width = maxSize;
          height = maxSize / aspectRatio;
        } else {
          height = maxSize;
          width = maxSize * aspectRatio;
        }

        const texture = new THREE.Texture(img);
        texture.needsUpdate = true;

        const geometry = new THREE.PlaneGeometry(width, height);

        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          side: THREE.DoubleSide,
        });

        const mesh = new THREE.Mesh(geometry, material);

        // === LOGIC SẮP XẾP MỚI ===
        const totalImages = existingCount + indexInBatch + 1;

        // Xếp thành nhiều vòng (layers) nếu ảnh nhiều
        // Mỗi vòng khoảng 8-10 ảnh
        const imagesPerLayer = 8;
        const layer = Math.floor(
          (existingCount + indexInBatch) / imagesPerLayer,
        );
        const indexInLayer = (existingCount + indexInBatch) % imagesPerLayer;

        // Bán kính tăng theo từng lớp
        const radius = 4 + layer * 1.5;

        // Góc chia đều cho mỗi vòng
        const angle = (indexInLayer / imagesPerLayer) * Math.PI * 2;

        mesh.position.x = Math.cos(angle) * radius;
        mesh.position.z = Math.sin(angle) * radius;

        // Dàn đều theo chiều cao theo từng lớp
        mesh.position.y = layer * 0.5 + (Math.random() - 0.5) * 0.5;

        // Hướng mặt vào giữa
        mesh.lookAt(0, 0, 0);

        mesh.userData = {
          originalPos: mesh.position.clone(),
          angle: angle,
          radius: radius,
        };

        imageMeshes.push(mesh);
        scene.add(mesh);
        imageMeshes.push(mesh);
        scene.add(mesh);
      }
      function updateImageCount() {
        document.getElementById("imageCount").textContent = imageMeshes.length;
      }

      function showError(msg) {
        const errorEl = document.getElementById("error-msg");
        if (msg) {
          errorEl.textContent = msg;
          errorEl.style.display = "block";
          setTimeout(() => {
            errorEl.style.display = "none";
          }, 3000);
        } else {
          errorEl.style.display = "none";
        }
      }

      function createParticles() {
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;

        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
          posArray[i] = (Math.random() - 0.5) * 30;
        }

        particlesGeometry.setAttribute(
          "position",
          new THREE.BufferAttribute(posArray, 3),
        );

        const particlesMaterial = new THREE.PointsMaterial({
          size: 0.02,
          color: 0xff6b9d,
          transparent: true,
          opacity: 0.8,
        });

        const particlesMesh = new THREE.Points(
          particlesGeometry,
          particlesMaterial,
        );
        scene.add(particlesMesh);
      }
      let heartParticles;

      function createHeartParticles() {
        const positions = [];
        const colors = [];
        heartBasePositions = [];

        const particleCount = 8000;

        for (let i = 0; i < particleCount; i++) {
          let x, y;
          let inside = false;

          while (!inside) {
            x = (Math.random() - 0.5) * 3;
            y = (Math.random() - 0.5) * 3;

            const formula = Math.pow(x * x + y * y - 1, 3) - x * x * y * y * y;

            if (formula <= 0) inside = true;
          }

          const dist = Math.sqrt(x * x + y * y);

          const z = (Math.random() - 0.5) * 1;

          heartBasePositions.push(x, y, z);
          positions.push(x, y, z);

          // 🔥 viền sáng hơn
          if (dist > 0.8) {
            colors.push(1, 0.05, 0.4);
          } else {
            colors.push(1, 0.2, 0.6);
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3),
        );

        geometry.setAttribute(
          "color",
          new THREE.Float32BufferAttribute(colors, 3),
        );

        const material = new THREE.PointsMaterial({
          size: 0.035,
          vertexColors: true,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });

        heartParticles = new THREE.Points(geometry, material);
        heartParticles.scale.set(1.6, 1.6, 1.6);

        scene.add(heartParticles);
        const light = new THREE.PointLight(0xff88aa, 2, 10);
        light.position.set(0, 0, 0);
        scene.add(light);
      }

      function resetCamera() {
        camera.position.set(0, 0, 8);
        controls.reset();
      }

      function toggleAutoRotate() {
        isAutoRotate = !isAutoRotate;
        controls.autoRotate = isAutoRotate;
        controls.autoRotateSpeed = 0.5;

        autoRotateBtn.textContent = isAutoRotate
          ? "⚡ Tự Xoay: Bật"
          : "⚡ Tự Xoay: Tắt";
      }

      function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.001;
        if (heartParticles) {
          const positions = heartParticles.geometry.attributes.position.array;
          const time = Date.now() * 0.001;

          for (let i = 0; i < positions.length; i += 3) {
            positions[i + 2] =
              heartBasePositions[i + 2] + Math.sin(time + i) * 0.05;
          }

          heartParticles.geometry.attributes.position.needsUpdate = true;
        }
        // Tạo chiều sâu cho lớp sao
        if (starsNear) starsNear.rotation.y += 0.0005;
        if (starsMid) starsMid.rotation.y += 0.0002;
        if (starsFar) starsFar.rotation.y += 0.0001;
        // Xoay trái tim
        if (heartParticles) {
          heartParticles.rotation.y += 0.00003;
        }
        // Ảnh dao động nhẹ
        imageMeshes.forEach((mesh, i) => {
          if (mesh.userData.originalPos) {
            mesh.position.y =
              mesh.userData.originalPos.y + Math.sin(time + i) * 0.2;
          }
        });

        // === Chữ bay theo quỹ đạo ===
        textMeshes.forEach((mesh) => {
          const data = mesh.userData;

          // Tăng góc theo thời gian
          data.angle += data.speed;

          // Tính vị trí theo quỹ đạo elip nghiêng
          const t = data.angle + data.timeOffset;

          mesh.position.x = Math.cos(t) * data.radiusX;
          mesh.position.y = Math.sin(t) * data.radiusY + Math.sin(t * 2) * 0.5; // Thêm dao động lên xuống
          mesh.position.z = Math.sin(t) * data.radiusZ;

          // Nghiêng quỹ đạo
          mesh.position.y += mesh.position.x * data.tiltX * 0.3;
          mesh.position.z += mesh.position.x * data.tiltZ * 0.3;

          // Tự xoay
          mesh.rotation.z += data.rotSpeed;

          // Luôn hướng về camera
          mesh.lookAt(camera.position);
        });
        // ================================

        controls.update();
        renderer.render(scene, camera);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      function setupPanelToggle() {
        const toggleBtn = document.getElementById("menuToggle");
        const panel = document.getElementById("controlPanel");
        const closeBtn = document.getElementById("closePanel");

        toggleBtn.addEventListener("click", () => {
          panel.classList.add("active");
          toggleBtn.style.display = "none";
        });

        closeBtn.addEventListener("click", () => {
          panel.classList.remove("active");
          toggleBtn.style.display = "block";
        });
      }

      /* thư */
      function setupLetterPopup() {
        const openBtn = document.getElementById("openLetter");
        const popup = document.getElementById("letterPopup");
        const closeBtn = document.getElementById("closeLetter");
        const typingText = document.getElementById("typingText");

        const message = `Anh mở lòng yêu em, không phải thay thế bất kỳ ai cả, cũng chẳng vì ngoại hình hay gì cả. Mà bởi vì một khoảnh khắc nào đó trong cuộc trò chuyện em đã trạm đến trái tim của anh . Iu myduyen heoo🥰`;

        let typingInterval;

        openBtn.onclick = function () {
          popup.classList.add("active");

          typingText.innerHTML = "";

          let i = 0;

          clearInterval(typingInterval);

          typingInterval = setInterval(() => {
            typingText.innerHTML += message.charAt(i);

            i++;

            if (i >= message.length) {
              clearInterval(typingInterval);
            }
          }, 40);
        };

        closeBtn.onclick = function () {
          popup.classList.remove("active");
        };

        popup.onclick = function (e) {
          if (e.target === popup) {
            popup.classList.remove("active");
          }
        };
      }
      window.onload = function () {
        init();
        setupPanelToggle();
        setupLetterPopup();
      };
    </script>
    <div id="letterPopup" class="letter-popup">
      <div class="letter-box">
        <button id="closeLetter">✖</button>

        <h2>💌 Gửi Em</h2>

        <div id="typingText"></div>
      </div>
    </div>
    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <script>
      document.addEventListener(
        "click",
        function () {
          const music = document.getElementById("bgMusic");
          music.play();
        },
        { once: true },
      );
    </script>
    <script src="script.js"></script>
  </body>
</html>
